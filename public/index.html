<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.2/bundles/datastar.js"
    ></script>
    <title>Shopping Cart</title>
  </head>

  <body
    data-signals="{cartCount: 0}"
    data-effect="document.title = 'Shopping Cart' + ($cartCount ? ' (' + $cartCount + ')' : '')"
  >
    <section class="cart">
      <span data-show="!$cartCount">Your cart is empty</span>
      <span
        class="item-count"
        data-show="$cartCount"
        data-text="'Cart: ' + $cartCount + ' item' + ($cartCount === 1 ? '' : 's')"
      ></span>
    </section>

    <section class="products">
      <!-- Card 1 -->
      <article
        class="product-card"
        data-signals="{name1: 'Mechanical Keyboard', description1: 'Clicky tactile switches, TKL layout', price1: 89.99, qty1: 1, inCart1: false, originalPrice1: 0, qtyInput1: null, visible1: false, countdown1: 300}"
        data-init="$originalPrice1 = $price1"
        data-class="{highlight: $inCart1, visible: $visible1}"
        data-computed:line-total1="$price1 * $qty1"
        data-on-intersect__once="$visible1 = true"
        data-on-interval="$countdown1 > 0 && $countdown1--"
      >
        <span class="name" data-text="$name1"></span>
        <span class="description" data-text="$description1"></span>
        <span
          data-text="'Sale ends in: ' + Math.floor($countdown1 / 60) + ':' + String($countdown1 % 60).padStart(2, '0')"
          data-show="$countdown1 > 0"
          data-style:color="$countdown1 > 60 ? 'green' : $countdown1 > 10 ? 'orange' : 'red'"
        ></span>
        <span class="price" data-text="'$' + $price1.toFixed(2)"></span>
        <span data-text="'Original: $' + $originalPrice1"></span>
        <div class="quantity-control">
          <button data-on:click="$qty1 > 1 && $qty1--">-</button>
          <input type="number" data-bind:qty1 data-ref:qty-input1 />
          <button data-on:click="$qty1 < 10 && $qty1++">+</button>
        </div>
        <span
          class="line-total"
          data-text="'Total: $' + $lineTotal1.toFixed(2)"
        ></span>
        <button
          class="add-to-cart"
          data-on:click="!$inCart1 && ($cartCount++, $inCart1 = true, $qtyInput1.focus())"
          data-attr:disabled="$inCart1"
          data-text="$inCart1 ? 'Added' : 'Add to Cart'"
        ></button>
      </article>

      <!-- Card 2 -->
      <article
        class="product-card"
        data-class="{highlight: $inCart2, visible: $visible2}"
        data-signals="{name2: 'Wireless Mouse', description2: 'Ergonomic design, 3-month battery life', price2: 49.99, qty2: 1, inCart2: false, qtyInput2: null, visible2: false}"
        data-computed:line-total2="$price2 * $qty2"
        data-on-intersect__once="$visible2 = true"
      >
        <span class="name" data-text="$name2"></span>
        <span class="description" data-text="$description2"></span>
        <span class="price" data-text="'$' + $price2.toFixed(2)"></span>
        <div class="quantity-control">
          <button data-on:click="$qty2 > 1 && $qty2--">-</button>
          <input type="number" data-bind:qty2 data-ref:qty-input2 />
          <button data-on:click="$qty2 < 10 && $qty2++">+</button>
        </div>
        <span
          class="line-total"
          data-text="'Total: $' + $lineTotal2.toFixed(2)"
        ></span>
        <button
          class="add-to-cart"
          data-on:click="!$inCart2 && ($cartCount++, $inCart2 = true, $qtyInput2.focus())"
          data-attr:disabled="$inCart2"
          data-text="$inCart2 ? 'Added' : 'Add to Cart'"
        ></button>
      </article>

      <!-- Card 3 -->
      <article
        class="product-card"
        data-class="{highlight: $inCart3, visible: $visible3}"
        data-signals="{name3: 'USB-C Monitor', description3: '27-inch 4K display, 60Hz refresh rate', price3: 349.99, qty3: 1, inCart3: false, qtyInput3: null, visible3: false}"
        data-computed:line-total3="$price3 * $qty3"
        data-on-intersect__once="$visible3 = true"
      >
        <span class="name" data-text="$name3"></span>
        <span class="description" data-text="$description3"></span>
        <span class="price" data-text="'$' + $price3.toFixed(2)"></span>
        <div class="quantity-control">
          <button data-on:click="$qty3 > 1 && $qty3--">-</button>
          <input type="number" data-bind:qty3 data-ref:qty-input3 />
          <button data-on:click="$qty3 < 10 && $qty3++">+</button>
        </div>
        <span
          class="line-total"
          data-text="'Total: $' + $lineTotal3.toFixed(2)"
        ></span>
        <button
          class="add-to-cart"
          data-on:click="!$inCart3 && ($cartCount++, $inCart3 = true, $qtyInput3.focus())"
          data-attr:disabled="$inCart3"
          data-text="$inCart3 ? 'Added' : 'Add to Cart'"
        ></button>
      </article>
    </section>

    <pre class="json-signals" data-json-signals=""></pre>
  </body>
</html>
