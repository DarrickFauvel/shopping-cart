<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="./portfolio-drawer.js"></script>
    <script type="module" src="./product-card.js"></script>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.2/bundles/datastar.js"
    ></script>
    <title>Shopping Cart</title>
  </head>

  <body
    data-signals="{cartCount: 0, theme: 'dark', themeAnimate: false, cartId: '', groceryCartId: '', shopperId: ''}"
    data-effect="document.title = 'Shopping Cart' + ($cartCount ? ' (' + $cartCount + ')' : ''); document.documentElement.dataset.theme = $theme; $shopperId && localStorage.setItem('shopperId', $shopperId)"
    data-init="@get('/products')"
  >
    <script>
      const _sid = localStorage.getItem('shopperId')
      if (_sid) { const b = document.body; const s = JSON.parse(b.dataset.signals); s.shopperId = _sid; b.dataset.signals = JSON.stringify(s) }
    </script>
    <header class="title-bar">
      <h1>Shopping Cart</h1>
      <span>using Datastar</span>
      <span class="shopper-badge" data-show="$shopperId !== ''" data-text="$shopperId"></span>
      <button
        class="theme-toggle"
        data-on:click="$theme = $theme === 'dark' ? 'light' : 'dark'; $themeAnimate = true"
      ><span
          class="toggle-icon"
          data-text="$theme === 'dark' ? '☀' : '☾'"
          data-class="{spin: $themeAnimate}"
          data-on:animationend="$themeAnimate = false"
        ></span>
        <span data-text="$theme === 'dark' ? ' Light' : ' Dark'"></span>
      </button>
    </header>

    <main>
      <nav class="cart-nav">
        <button
          class="cart-tab"
          data-class="{active: $cartId === $shopperId}"
          data-on:click="$cartId = $shopperId, @get('/products')"
        >Tech Cart</button>
        <button
          class="cart-tab"
          data-show="$groceryCartId !== ''"
          data-class="{active: $cartId === $groceryCartId}"
          data-on:click="$cartId = $groceryCartId, @get('/products')"
        >Grocery Cart</button>
        <button
          class="cart-tab cart-tab--new"
          data-show="$groceryCartId === ''"
          data-on:click="@post('/carts/new')"
        >+ New Cart</button>
      </nav>

      <fieldset class="cart">
        <legend>Cart</legend>
        <span class="cart-empty" data-class="{shown: !$cartCount}">Your cart is empty</span>
        <div class="cart-body" data-class="{empty: !$cartCount}">
          <ul id="cart-list"></ul>
          <div class="cart-footer" data-class="{shown: $cartCount}">
            <button class="clear-cart" data-on:click="@delete('/cart')">Clear cart</button>
            <div id="cart-total"></div>
          </div>
        </div>
      </fieldset>

      <section class="products">
        <div id="product-list"></div>
      </section>
    </main>

    <portfolio-drawer>
      <script type="application/json">
      [
        { "label": "Node.js + Express", "note": "REST API + SSE endpoints"      },
        { "label": "Turso / libSQL",    "note": "Edge SQLite database"           },
        { "label": "CSS Nesting",       "note": "Native scoped styles"           },
        { "label": "Light/Dark Mode",   "note": "Datastar signal + CSS vars"     }
      ]
      </script>
    </portfolio-drawer>
  </body>
</html>
