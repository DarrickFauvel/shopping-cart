<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="./product-card.js"></script>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.2/bundles/datastar.js"
    ></script>
    <title>Shopping Cart</title>
  </head>

  <body
    data-signals="{cartCount: 0, saving: false, saved: false}"
    data-effect="document.title = 'Shopping Cart' + ($cartCount ? ' (' + $cartCount + ')' : '')"
    data-init="@get('/products')"
  >
    <section class="cart">
      <span data-show="!$cartCount">Your cart is empty</span>
      <span
        class="item-count"
        data-show="$cartCount"
        data-text="'Cart: ' + $cartCount + ' item' + ($cartCount === 1 ? '' : 's')"
      ></span>
    </section>

    <section
      class="add-product"
      data-signals="{newName: '', newDescription: '', newPrice: ''}"
    >
      <input type="text" placeholder="Name" data-bind:new-name />
      <input type="text" placeholder="Description" data-bind:new-description />
      <input type="number" data-bind:new-price />
      <button data-on:click="@post('/products/add')">Add Product</button>
    </section>

    <section class="products">
      <product-card card-id="1"></product-card>
      <product-card card-id="2"></product-card>
      <product-card card-id="3"></product-card>

      <button data-indicator:saving data-on:click="@post('/cart/save')">
        Save Cart
      </button>
      <span data-show="$saving">Saving...</span>
      <span data-show="$saved && !$saving">Saved!</span>
    </section>

    <pre class="json-signals" data-json-signals=""></pre>
  </body>
</html>
