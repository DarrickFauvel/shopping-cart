<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="./portfolio-drawer.js"></script>
    <script type="module" src="./product-card.js"></script>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.2/bundles/datastar.js"
    ></script>
    <title>Shopping Cart</title>
  </head>

  <body
    data-signals="{cartCount: 0, saving: false, saved: false, theme: 'dark', themeAnimate: false}"
    data-effect="document.title = 'Shopping Cart' + ($cartCount ? ' (' + $cartCount + ')' : ''); document.documentElement.dataset.theme = $theme"
    data-init="@get('/products')"
  >
    <header class="title-bar">
      <h1>Shopping Cart</h1>
      <span>using Datastar</span>
      <button
        class="theme-toggle"
        data-on:click="$theme = $theme === 'dark' ? 'light' : 'dark'; $themeAnimate = true"
      ><span
          class="toggle-icon"
          data-text="$theme === 'dark' ? '☀' : '☾'"
          data-class="{spin: $themeAnimate}"
          data-on:animationend="$themeAnimate = false"
        ></span>
        <span data-text="$theme === 'dark' ? ' Light' : ' Dark'"></span>
      </button>
    </header>

    <section class="cart">
      <span data-show="!$cartCount">Your cart is empty</span>
      <span
        class="item-count"
        data-show="$cartCount"
        data-text="'Cart: ' + $cartCount + ' item' + ($cartCount === 1 ? '' : 's')"
      ></span>
    </section>

    <section
      class="add-product"
      data-signals="{newName: '', newDescription: '', newPrice: 0}"
    >
      <div class="float-label">
        <label for="new-name" data-class="{floating: !!$newName}">Name</label>
        <input id="new-name" type="text" data-bind:new-name />
      </div>
      <div class="float-label">
        <label for="new-description" data-class="{floating: !!$newDescription}">Description</label>
        <input id="new-description" type="text" data-bind:new-description />
      </div>
      <div class="float-label">
        <label for="new-price" class="floating">Price</label>
        <input id="new-price" type="number" min="0" data-bind:new-price />
      </div>
      <button data-on:click="@post('/products/add')">Add Product</button>
    </section>

    <div id="product-list"></div>

    <section class="cart-actions">
      <button data-indicator:saving data-on:click="@post('/cart/save')">
        Save Cart
      </button>
      <span data-show="$saving">Saving...</span>
      <span data-show="$saved && !$saving">Saved!</span>
    </section>
    <portfolio-drawer>
      <script type="application/json">
      [
        { "label": "Node.js + Express", "note": "REST API + SSE endpoints"      },
        { "label": "Turso / libSQL",    "note": "Edge SQLite database"           },
        { "label": "CSS Nesting",       "note": "Native scoped styles"           },
        { "label": "Light/Dark Mode",   "note": "Datastar signal + CSS vars"     }
      ]
      </script>
    </portfolio-drawer>
  </body>
</html>
